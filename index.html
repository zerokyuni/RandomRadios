<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Radio Launcher</title>
    <style>
        /* 화면 전체를 덮는 버튼 스타일 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212; /* 눈부심 방지 다크 모드 */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #launchBtn {
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            border: none;
            color: #ffffff;
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="launchBtn" onclick="launchRadio()">화면을 터치하면 무작위 라디오가 켜집니다</button>

    <script>
        function launchRadio() {
            // 라디오 앱 4종의 안드로이드 인텐트(Intent) URI 배열
            const radioApps = [
                "intent://#Intent;package=com.imbc.mini;end",    // MBC mini
                "intent://#Intent;package=kr.co.kbs.kong;end",   // KBS Kong
                "intent://#Intent;package=kr.ebs.bandi;end",  // EBS 반디
                "intent://#Intent;package=com.appgate.gorealra;end"   // SBS 고릴라
            ];
            
            // 0에서 3 사이의 난수 생성하여 무작위 추출
            const randomIndex = Math.floor(Math.random() * radioApps.length);
            
            // 선택된 라디오 앱으로 즉시 리다이렉션
            window.location.href = radioApps[randomIndex];
        }
    </script>
</body>
</html>
